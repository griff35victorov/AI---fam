services:
  web:
    build:
      context: .
    command: ["node", "apps/api/src/server.js"]
    ports:
      - "${PORT:-8080}:8080"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 8080
      DATABASE_URL: ${DATABASE_URL}
      TIMEWEB_AI_BASE_URL: ${TIMEWEB_AI_BASE_URL}
      TIMEWEB_AI_AGENT_ID: ${TIMEWEB_AI_AGENT_ID}
      TIMEWEB_AI_AGENT_TOKEN: ${TIMEWEB_AI_AGENT_TOKEN}
      TELEGRAM_BOT_TOKEN_MAIN: ${TELEGRAM_BOT_TOKEN_MAIN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}

  worker:
    build:
      context: .
    command: ["node", "apps/worker/src/main.js"]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL}
      TIMEWEB_AI_BASE_URL: ${TIMEWEB_AI_BASE_URL}
      TIMEWEB_AI_AGENT_ID: ${TIMEWEB_AI_AGENT_ID}
      TIMEWEB_AI_AGENT_TOKEN: ${TIMEWEB_AI_AGENT_TOKEN}
      TELEGRAM_BOT_TOKEN_MAIN: ${TELEGRAM_BOT_TOKEN_MAIN}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}

  scheduler:
    build:
      context: .
    command: ["node", "apps/worker/src/scheduler.js"]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL}
      SCHEDULER_INTERVAL_SECONDS: ${SCHEDULER_INTERVAL_SECONDS:-30}
