services:
  web:
    build:
      context: .
    command: ["sh", "-c", "npm run db:migrate && exec node apps/api/src/server.js"]
    ports:
      - "${PORT:-8080}:8080"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NODE_OPTIONS: ${NODE_OPTIONS:-}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-}
      PORT: 8080
      DATABASE_URL: ${DATABASE_URL}
      FAMILY_AI_BOOTSTRAP_USERS: ${FAMILY_AI_BOOTSTRAP_USERS:-}
      FAMILY_AI_BOOTSTRAP_USERS_ALLOW_WRITE: ${FAMILY_AI_BOOTSTRAP_USERS_ALLOW_WRITE:-0}
      TIMEWEB_AI_BASE_URL: ${TIMEWEB_AI_BASE_URL:-https://agent.timeweb.cloud}
      TIMEWEB_AI_API_KEY: ${TIMEWEB_AI_API_KEY:-}
      TIMEWEB_AGENT_IDS: ${TIMEWEB_AGENT_IDS:-}
      TIMEWEB_AGENT_FAMILY_DISPATCHER: ${TIMEWEB_AGENT_FAMILY_DISPATCHER:-}
      TIMEWEB_AGENT_OWNER_ASSISTANT: ${TIMEWEB_AGENT_OWNER_ASSISTANT:-}
      TIMEWEB_AGENT_SHOPPING_ASSISTANT: ${TIMEWEB_AGENT_SHOPPING_ASSISTANT:-}
      TIMEWEB_AGENT_DESIGN_ASSISTANT: ${TIMEWEB_AGENT_DESIGN_ASSISTANT:-}
      TIMEWEB_AGENT_TEACHER_METHODOLOGIST: ${TIMEWEB_AGENT_TEACHER_METHODOLOGIST:-}
      TIMEWEB_AGENT_TEACHER_SECRETARY: ${TIMEWEB_AGENT_TEACHER_SECRETARY:-}
      TIMEWEB_AGENT_MATERIALS_LIBRARIAN: ${TIMEWEB_AGENT_MATERIALS_LIBRARIAN:-}
      TIMEWEB_AGENT_COMMUNICATION_ASSISTANT: ${TIMEWEB_AGENT_COMMUNICATION_ASSISTANT:-}
      TIMEWEB_AGENT_DAUGHTER_TUTOR: ${TIMEWEB_AGENT_DAUGHTER_TUTOR:-}
      TIMEWEB_AGENT_DAUGHTER_ENGLISH_COACH: ${TIMEWEB_AGENT_DAUGHTER_ENGLISH_COACH:-}
      TIMEWEB_AGENT_SCHEDULER: ${TIMEWEB_AGENT_SCHEDULER:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_OWNER_BOT_TOKEN: ${TELEGRAM_OWNER_BOT_TOKEN:-}
      TELEGRAM_DAUGHTER_BOT_TOKEN: ${TELEGRAM_DAUGHTER_BOT_TOKEN:-}
      TELEGRAM_TEACHER_BOT_TOKEN: ${TELEGRAM_TEACHER_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      TELEGRAM_OWNER_WEBHOOK_SECRET: ${TELEGRAM_OWNER_WEBHOOK_SECRET:-}
      TELEGRAM_DAUGHTER_WEBHOOK_SECRET: ${TELEGRAM_DAUGHTER_WEBHOOK_SECRET:-}
      TELEGRAM_TEACHER_WEBHOOK_SECRET: ${TELEGRAM_TEACHER_WEBHOOK_SECRET:-}
      TELEGRAM_DROP_PENDING_UPDATES: ${TELEGRAM_DROP_PENDING_UPDATES:-false}
      TELEGRAM_REPLY_MODE: ${TELEGRAM_REPLY_MODE:-webhook_response}
      TELEGRAM_REQUIRE_WEBHOOK_SECRET: ${TELEGRAM_REQUIRE_WEBHOOK_SECRET:-true}
      TELEGRAM_POLLING_ENABLED: ${TELEGRAM_POLLING_ENABLED:-false}
      TELEGRAM_POLLING_INTERVAL_MS: ${TELEGRAM_POLLING_INTERVAL_MS:-1000}
      TELEGRAM_POLLING_ERROR_DELAY_MS: ${TELEGRAM_POLLING_ERROR_DELAY_MS:-5000}
      TELEGRAM_POLLING_TIMEOUT_SECONDS: ${TELEGRAM_POLLING_TIMEOUT_SECONDS:-20}
      TELEGRAM_UPDATE_QUEUE_ENABLED: ${TELEGRAM_UPDATE_QUEUE_ENABLED:-true}
      TELEGRAM_UPDATE_DISPATCHER_INTERVAL_MS: ${TELEGRAM_UPDATE_DISPATCHER_INTERVAL_MS:-1000}
      TELEGRAM_UPDATE_DISPATCHER_MAX_JOBS: ${TELEGRAM_UPDATE_DISPATCHER_MAX_JOBS:-10}
      TELEGRAM_UPDATE_DISPATCHER_MAX_ATTEMPTS: ${TELEGRAM_UPDATE_DISPATCHER_MAX_ATTEMPTS:-3}
      TELEGRAM_UPDATE_DISPATCHER_RETRY_DELAY_MS: ${TELEGRAM_UPDATE_DISPATCHER_RETRY_DELAY_MS:-5000}
      SUPERVISOR_ENABLED: ${SUPERVISOR_ENABLED:-true}
      SUPERVISOR_INTERVAL_MS: ${SUPERVISOR_INTERVAL_MS:-60000}
      SUPERVISOR_ALERT_COOLDOWN_MS: ${SUPERVISOR_ALERT_COOLDOWN_MS:-600000}
      SUPERVISOR_AUTO_HEAL: ${SUPERVISOR_AUTO_HEAL:-true}
      SUPERVISOR_AUDIT_OK_TICKS: ${SUPERVISOR_AUDIT_OK_TICKS:-false}
      SUPERVISOR_AUDIT_DEDUP_MS: ${SUPERVISOR_AUDIT_DEDUP_MS:-600000}
      SUPERVISOR_ALERT_CHAT_ID: ${SUPERVISOR_ALERT_CHAT_ID:-}
      TELEGRAM_RELAY_URL: ${TELEGRAM_RELAY_URL:-}
      TELEGRAM_RELAY_SECRET: ${TELEGRAM_RELAY_SECRET:-}
      TELEGRAM_RELAY_UPSTREAM_SECRET: ${TELEGRAM_RELAY_UPSTREAM_SECRET:-}
      TELEGRAM_WEBHOOK_INGRESS: ${TELEGRAM_WEBHOOK_INGRESS:-relay}
      TELEGRAM_ALLOW_DIRECT_BACKGROUND_SEND: ${TELEGRAM_ALLOW_DIRECT_BACKGROUND_SEND:-false}
      WEATHER_TIMEOUT_MS: ${WEATHER_TIMEOUT_MS:-6000}
      APP_DEFAULT_LOCATION: ${APP_DEFAULT_LOCATION:-Москва}
      APP_DEFAULT_TIME_ZONE: ${APP_DEFAULT_TIME_ZONE:-Europe/Moscow}
      VOICE_TRANSCRIPTION_PROVIDER: ${VOICE_TRANSCRIPTION_PROVIDER:-local_vosk}
      VOICE_TRANSCRIPTION_URL: ${VOICE_TRANSCRIPTION_URL:-}
      VOICE_TRANSCRIPTION_API_KEY: ${VOICE_TRANSCRIPTION_API_KEY:-}
      VOICE_TRANSCRIPTION_MODEL: ${VOICE_TRANSCRIPTION_MODEL:-}
      VOICE_TRANSCRIPTION_LANGUAGE: ${VOICE_TRANSCRIPTION_LANGUAGE:-ru}
      VOSK_MODEL_PATH: ${VOSK_MODEL_PATH:-/opt/vosk/model}
      VOSK_PYTHON_PATH: ${VOSK_PYTHON_PATH:-python3}
      VOSK_TRANSCRIPTION_TIMEOUT_MS: ${VOSK_TRANSCRIPTION_TIMEOUT_MS:-25000}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}

  worker:
    profiles: ["background"]
    build:
      context: .
    command: ["node", "apps/worker/src/main.js"]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NODE_OPTIONS: ${NODE_OPTIONS:-}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-}
      DATABASE_URL: ${DATABASE_URL}
      TIMEWEB_AI_BASE_URL: ${TIMEWEB_AI_BASE_URL:-https://agent.timeweb.cloud}
      TIMEWEB_AI_API_KEY: ${TIMEWEB_AI_API_KEY:-}
      TIMEWEB_AGENT_IDS: ${TIMEWEB_AGENT_IDS:-}
      TIMEWEB_AGENT_FAMILY_DISPATCHER: ${TIMEWEB_AGENT_FAMILY_DISPATCHER:-}
      TIMEWEB_AGENT_OWNER_ASSISTANT: ${TIMEWEB_AGENT_OWNER_ASSISTANT:-}
      TIMEWEB_AGENT_SHOPPING_ASSISTANT: ${TIMEWEB_AGENT_SHOPPING_ASSISTANT:-}
      TIMEWEB_AGENT_DESIGN_ASSISTANT: ${TIMEWEB_AGENT_DESIGN_ASSISTANT:-}
      TIMEWEB_AGENT_TEACHER_METHODOLOGIST: ${TIMEWEB_AGENT_TEACHER_METHODOLOGIST:-}
      TIMEWEB_AGENT_TEACHER_SECRETARY: ${TIMEWEB_AGENT_TEACHER_SECRETARY:-}
      TIMEWEB_AGENT_MATERIALS_LIBRARIAN: ${TIMEWEB_AGENT_MATERIALS_LIBRARIAN:-}
      TIMEWEB_AGENT_COMMUNICATION_ASSISTANT: ${TIMEWEB_AGENT_COMMUNICATION_ASSISTANT:-}
      TIMEWEB_AGENT_DAUGHTER_TUTOR: ${TIMEWEB_AGENT_DAUGHTER_TUTOR:-}
      TIMEWEB_AGENT_DAUGHTER_ENGLISH_COACH: ${TIMEWEB_AGENT_DAUGHTER_ENGLISH_COACH:-}
      TIMEWEB_AGENT_SCHEDULER: ${TIMEWEB_AGENT_SCHEDULER:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_OWNER_BOT_TOKEN: ${TELEGRAM_OWNER_BOT_TOKEN:-}
      TELEGRAM_DAUGHTER_BOT_TOKEN: ${TELEGRAM_DAUGHTER_BOT_TOKEN:-}
      TELEGRAM_TEACHER_BOT_TOKEN: ${TELEGRAM_TEACHER_BOT_TOKEN:-}
      TELEGRAM_REPLY_MODE: ${TELEGRAM_REPLY_MODE:-webhook_response}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}

  scheduler:
    profiles: ["background"]
    build:
      context: .
    command: ["node", "apps/worker/src/scheduler.js"]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NODE_OPTIONS: ${NODE_OPTIONS:-}
      DATABASE_URL: ${DATABASE_URL}
      SCHEDULER_INTERVAL_SECONDS: ${SCHEDULER_INTERVAL_SECONDS:-30}
